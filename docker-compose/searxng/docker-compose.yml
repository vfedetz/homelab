services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: searxng-gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "nautical-backup.group=searxng"
      - "nautical-backup.group.searxng.priority=103"
    ports:
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
      - 8123:8000/tcp # HTTP control server
      - 8786:8080 # port for searxng
    volumes:
      - /home/vfedetz/docker/searxng-gluetun:/gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - VPN_SERVICE_PROVIDER=private internet access
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_REGIONS=US Wilmington
      - TZ=America/New_York
      - HTTPPROXY=off #change to on if you wish to enable
      - SHADOWSOCKS=off #change to on if you wish to enable
      - FIREWALL_OUTBOUND_SUBNETS=172.20.0.0/16,192.168.1.0/24 #change this in line with your subnet see note on guide.
#      - FIREWALL_VPN_INPUT_PORTS=40312 #uncomment this line and change the port as per the note on the guide
      - HTTP_CONTROL_SERVER_LOG=on
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - UPDATER_PERIOD=24h #update the servers information for the currently in-use VPN service provider.
    restart: unless-stopped
    env_file:
      - /data/env/searxng/.env

  searxng:
    container_name: searxng-core
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    network_mode: service:gluetun # run on the vpn network
    depends_on:
      valkey:
        condition: service_healthy
      gluetun:
        condition: service_healthy
    volumes:
      - /home/vfedetz/docker/searxng/core-config:/etc/searxng/
      - /home/vfedetz/docker/searxng/core-data:/var/cache/searxng/
    environment:
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME}/
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS:-4}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS:-4}
      - SEARXNG_VALKEY_URL=${SEARXNG_VALKEY_URL}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "nautical-backup.group=searxng"
      - "nautical-backup.group.searxng.priority=100"

  valkey:
    container_name: searxng-valkey
    image: docker.io/valkey/valkey:9-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - /home/vfedetz/docker/searxng/valkey-data:/data/
    labels:
      - "nautical-backup.group=searxng"
      - "nautical-backup.group.searxng.priority=102"
